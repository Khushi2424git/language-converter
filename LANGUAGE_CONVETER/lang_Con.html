<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Language Converter</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Poppins", sans-serif;
        }
        
        body{
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #202124;
        }
    
        form .container h2{
            margin-top: 2rem;
            background-color: white;

        }
        .container{
            /* background-color: #242528; */
            /* background-color: white; */
            border-radius: 20px;
            /* box-shadow: rgba(0, 0, 0, 0.35) 0px 5px 15px; */
            /* box-shadow: rgba(0, 0, 0, 0.09) 0px 2px 1px, rgba(0, 0, 0, 0.09) 0px 4px 2px, rgba(0, 0, 0, 0.09) 0px 8px 4px, rgba(0, 0, 0, 0.09) 0px 16px 8px, rgba(0, 0, 0, 0.09) 0px 32px 16px; */
            
            box-shadow: rgba(0, 0, 0, 0.56) 0px 22px 70px 4px;
            
        }

        .translateLang{
            margin: 1.5rem;
            display: flex;
            justify-content: space-between;
            gap: 2rem;
            align-items: center;
        }

        .translateLang i{
            font-size: 1.5rem;
            margin-top: 1.5rem;
            color: white;
        }
        .translateLang i:active{
            background-color: #97baf2;
            padding: 1rem;
            border-radius: 20px;
            transition: 2s;

        }

        .translateSection {
            display: flex;
            justify-content: space-around;
            align-items: center;
            gap: 4rem;
            margin-bottom: 2rem;
        }

        input{
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5px;
            margin-left: 2.1rem;
            margin-right: 0.1rem;
            font-size: 17px;
            /* margin: 1rem; */
            border-radius: 3px;
            outline: none; 
            border: none;
            color: white;
            background-color:#202124;
        }

        input::placeholder{
            color: white;
        }

        .container .btn{
            display: flex;
            justify-content: center;
            align-items: center;
        }

        button{
            width: 90%;
            margin-bottom: 2rem;
            border: none;
            height: 2rem;
            border-radius: 7px;
            height: 3rem;
            background-color: #8eb5f4;
            font-size: 1.55rem;
            cursor: pointer;
        }
        button:active{
            background-color: #b0cbf7;
            transition: 0.2s;
        }

        select{
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-left: 0.5rem;
            margin-right: 0.5rem;
            background-color: #202124;
        }

        select{
            margin-top: 1rem;
            gap: 1rem;
            font-size: 1rem;
            border: none;
            background-color: #161719;
            padding: 0.5rem;
            border-radius: 10px;
            color: #97baf2;
            outline: none;
        }

        .heading{
            display: flex;
            justify-content: space-around;
            align-items: center;
            
        }
        .heading p{
            margin-top: 2rem;
        }
        .heading ion-icon{
            font-size: 1.5rem;
            margin-top: 2rem;
            color: #8eb5f4;
        }

    </style>
</head>
<body>

    <form action="">
        <div class="container">

            <div class="heading">
                <ion-icon name="star"></ion-icon>
                <p style="font-size: 25px; color: rgb(192, 189, 189);"><span style="color: white; font-size: 28px;">Google</span> Translate</p>
                <ion-icon name="person-circle-sharp"></ion-icon>
            </div>

            <div class="translateLang">
                
                <div class="source">
                    <!-- <h4>Source Language</h4> -->
                    <select name="" id=""></select>
                </div>
                <i class="fa-solid fa-arrow-right-arrow-left"></i>

                <div class="target">
                    <!-- <h4>Target Language</h4> -->
                    <select name="" id=""></select>
                </div>
            </div>
    
            <div class="translateSection">
                <div class="input">
                    <input type="text" placeholder="Enter text">
                </div>
                <div class="output">
                    <input type="text" placeholder="Translation">
                </div>
            </div>
    
            <div class="btn">
                <button>Search</button>
    
            </div>
        </div>

    </form>

    

    <script>

        const cont = document.querySelector('.container')

        const url = 'https://text-translator2.p.rapidapi.com/getLanguages';
        const options = {
            method: 'GET',
            headers: {
                'X-RapidAPI-Key': '6872665745msh0a6ac9c616739ccp18c3e1jsna930c5361778',
                'X-RapidAPI-Host': 'text-translator2.p.rapidapi.com'
            }
        };

        fetch(url, options)
        .then(res => res.json())
        .then(res =>{
            console.log(res["data"]["languages"])
            let SourceSelect = document.querySelector('.source select')
            let TargetSelect = document.querySelector('.target select')

            for(const lang of res["data"]["languages"]){
                let myOption1 = document.createElement('option')
                myOption1.setAttribute('value', lang["code"])
                myOption1.textContent = lang["name"]

                let myOption = document.createElement('option')
                myOption.setAttribute('value', lang["code"])
                myOption.textContent = lang["name"]

                SourceSelect.appendChild(myOption1)
                TargetSelect.appendChild(myOption)
                console.log(lang)
            }

        })

        var Button = document.querySelector('.btn')
        Button.addEventListener('click', function(e){
            e.preventDefault()
            let SourceData = document.querySelector('.source select')
            let TargetData = document.querySelector('.target select')
            let InputData = document.querySelector('.input input')
            let OutputData = document.querySelector('.output input')

            console.log(SourceData.value)
            console.log(TargetData.value)


            let url1 = 'https://text-translator2.p.rapidapi.com/translate';
            const options1 = {
                method: 'POST',
                headers: {
                    'content-type': 'application/x-www-form-urlencoded',
                    'X-RapidAPI-Key': '6872665745msh0a6ac9c616739ccp18c3e1jsna930c5361778',
                    'X-RapidAPI-Host': 'text-translator2.p.rapidapi.com'
                },
                body: new URLSearchParams({
                    source_language: `${SourceData.value}`,
                    target_language: `${TargetData.value}`,
                    text: `${InputData.value}`
                })
            };

            fetch(url1, options1)
            .then(res=> res.json())
            .then (val =>{
                OutputData.value = val["data"]["translatedText"]
            })

    })
    </script>

    
</body>
</html>
